<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <!-- rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- back sheet -->
  <rect x="34" y="30" width="46" height="58" rx="9" fill="#FFFFFF" fill-opacity="0.45"/>

  <!-- front sheet -->
  <rect x="50" y="44" width="46" height="58" rx="9" fill="#FFFFFF"/>

  <!-- clipboard clip on front sheet -->
  <rect x="64" y="38" width="18" height="11" rx="4" fill="#38BDF8"/>

  <!-- text lines on front sheet -->
  <rect x="59" y="62" width="28" height="5.5" rx="2.75" fill="#7DD3FC"/>
  <rect x="59" y="74" width="28" height="5.5" rx="2.75" fill="#7DD3FC"/>
  <rect x="59" y="86" width="18" height="5.5" rx="2.75" fill="#7DD3FC"/>
</svg>
